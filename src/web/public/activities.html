<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activities — CSI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    /* Lock body scroll while the modal is open */
    body.modal-open { overflow: hidden; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
    <div class="mb-4 flex items-center justify-between gap-4 flex-wrap">
      <div>
        <h1 class="text-2xl font-bold">Activities</h1>
        <p class="text-sm text-gray-600">Everything we have ingested. Click a row to open the full detail — packages, SKUs, cancellation policy, raw extras.</p>
      </div>
      <div class="flex items-center gap-2 text-sm flex-wrap">
        <input id="search" type="text" placeholder="Search title…"
               class="border border-gray-300 rounded px-3 py-1.5 text-sm w-48" />
        <select id="poi" class="border border-gray-300 rounded px-2 py-1.5 text-sm">
          <option value="">All POIs</option>
        </select>
        <select id="platform" class="border border-gray-300 rounded px-2 py-1.5 text-sm">
          <option value="">All platforms</option>
          <option value="klook">klook</option>
          <option value="trip">trip</option>
          <option value="getyourguide">gyg</option>
          <option value="kkday">kkday</option>
          <option value="airbnb">airbnb</option>
        </select>
      </div>
    </div>

    <div id="summary" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4"></div>

    <div class="bg-white border border-gray-200 rounded-lg overflow-x-auto">
      <table class="w-full text-sm min-w-[1100px]">
        <thead class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
          <tr>
            <th class="text-left px-3 py-2">Platform</th>
            <th class="text-left px-3 py-2">POI</th>
            <th class="text-left px-3 py-2">Title</th>
            <th class="text-left px-3 py-2">Supplier</th>
            <th class="text-right px-3 py-2">★</th>
            <th class="text-right px-3 py-2">Reviews</th>
            <th class="text-right px-3 py-2">Orders</th>
            <th class="text-right px-3 py-2">Pkg</th>
            <th class="text-right px-3 py-2">SKU</th>
            <th class="text-right px-3 py-2">Price USD</th>
            <th class="text-left px-3 py-2">Status</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>

  <!-- Detail modal -->
  <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/40 z-40"></div>
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-start justify-center p-4 sm:p-8 overflow-y-auto" role="dialog" aria-modal="true">
    <div id="modal-card" class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl my-4 outline-none">
      <div class="flex items-start justify-between gap-4 p-5 border-b border-gray-200 sticky top-0 bg-white rounded-t-2xl z-10">
        <div id="modal-header" class="min-w-0 flex-1"></div>
        <button id="modal-close" type="button"
                class="text-gray-400 hover:text-gray-700 text-2xl leading-none px-2 -mr-2"
                aria-label="Close">×</button>
      </div>
      <div id="modal-body" class="p-5 space-y-6"></div>
    </div>
  </div>

  <script type="module">
    import { mountLayout } from '/_layout.js';
    import { listActivitiesWithStats, listPackagesForActivity, listSkusForActivity } from '/supabase-data.js';

    await mountLayout({ active: 'activities' });

    // ─── helpers ────────────────────────────────────────────────────────
    function el(tag, attrs = {}, children = []) {
      const n = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') n.className = v;
        else if (k === 'text') n.textContent = v;
        else if (k === 'on') {
          for (const [ev, h] of Object.entries(v)) n.addEventListener(ev, h);
        }
        else if (v != null && v !== false) n.setAttribute(k, v === true ? '' : v);
      }
      for (const c of children) if (c) n.appendChild(c);
      return n;
    }
    const fmtNum = (n) => n == null ? '—' : Number(n).toLocaleString();
    const fmtUsd = (n) => n == null ? '—' : `$${Number(n).toFixed(2)}`;
    const fmtDate = (iso) => iso ? iso.replace('T', ' ').slice(0, 16) : '—';
    function fmtDuration(min) {
      if (min == null) return '—';
      if (min < 60) return `${min}m`;
      const h = Math.floor(min / 60), m = min % 60;
      return m === 0 ? `${h}h` : `${h}h ${m}m`;
    }
    function platformBadge(p) {
      const tone = {
        klook: 'bg-orange-100 text-orange-800',
        trip: 'bg-blue-100 text-blue-800',
        getyourguide: 'bg-pink-100 text-pink-800',
        kkday: 'bg-green-100 text-green-800',
        airbnb: 'bg-rose-100 text-rose-700',
      }[p] || 'bg-gray-100 text-gray-700';
      return el('span', { class: `inline-block px-2 py-0.5 rounded text-xs font-medium ${tone}`, text: p });
    }
    function statusBadge(s) {
      const tone = {
        verified: 'bg-green-100 text-green-800',
        flagged: 'bg-yellow-100 text-yellow-800',
        rejected: 'bg-red-100 text-red-700',
        unverified: 'bg-gray-100 text-gray-600',
      }[s] || 'bg-gray-100 text-gray-600';
      return el('span', { class: `inline-block px-2 py-0.5 rounded text-xs font-medium ${tone}`, text: s || 'unverified' });
    }
    function priceRange(min, max) {
      if (min == null) return '—';
      return min === max ? fmtUsd(min) : `${fmtUsd(min)} – ${fmtUsd(max)}`;
    }
    function safeJson(s) {
      if (!s) return null;
      try { return typeof s === 'string' ? JSON.parse(s) : s; } catch { return null; }
    }

    // ─── state + table render ───────────────────────────────────────────
    let allRows = [];
    const tbody = document.getElementById('rows');
    const poiSelect = document.getElementById('poi');

    function renderSummary(rows) {
      const summary = document.getElementById('summary');
      summary.replaceChildren();
      const totals = {
        activities: rows.length,
        packages: rows.reduce((a, r) => a + (r.package_count ?? 0), 0),
        skus: rows.reduce((a, r) => a + (r.sku_count ?? 0), 0),
        platforms: new Set(rows.map((r) => r.platform)).size,
        pois: new Set(rows.filter((r) => r.poi).map((r) => r.poi.toLowerCase())).size,
      };
      const card = (label, val) => el('div', { class: 'bg-white border border-gray-200 rounded-lg px-3 py-2.5' }, [
        el('div', { class: 'text-xs text-gray-500 uppercase tracking-wide', text: label }),
        el('div', { class: 'text-xl font-bold tabular-nums mt-0.5', text: String(val) }),
      ]);
      summary.appendChild(card('Activities', totals.activities));
      summary.appendChild(card('Packages', totals.packages));
      summary.appendChild(card('SKUs', totals.skus));
      summary.appendChild(card('Platforms', totals.platforms));
      summary.appendChild(card('POIs', totals.pois));
    }

    function renderTable() {
      const search = document.getElementById('search').value.trim().toLowerCase();
      const poi = poiSelect.value;
      const plat = document.getElementById('platform').value;
      let rows = allRows;
      if (poi) rows = rows.filter((r) => (r.poi ?? '') === poi);
      if (plat) rows = rows.filter((r) => r.platform === plat);
      if (search) rows = rows.filter((r) => (r.title ?? '').toLowerCase().includes(search));

      renderSummary(rows);
      tbody.replaceChildren();
      if (rows.length === 0) {
        tbody.appendChild(el('tr', {}, [
          el('td', { class: 'px-4 py-6 text-center text-gray-400', colspan: '11', text: 'No activities match the filter.' }),
        ]));
        return;
      }

      for (const r of rows) {
        const titleInner = el('div', { class: 'min-w-0 flex-1' }, [
          el('div', { class: 'truncate font-medium', title: r.title || '', text: r.title || '(untitled)' }),
          el('div', { class: 'text-xs text-gray-400 truncate', text: r.platform_product_id || '' }),
        ]);
        const titleWrap = el('div', { class: 'flex items-center gap-2.5' });
        if (r.cover_image_url) {
          titleWrap.appendChild(el('img', {
            src: r.cover_image_url,
            alt: '',
            loading: 'lazy',
            referrerpolicy: 'no-referrer',
            class: 'w-10 h-10 rounded object-cover bg-gray-100 shrink-0 border border-gray-200',
          }));
        }
        titleWrap.appendChild(titleInner);
        const titleCell = el('td', { class: 'px-3 py-2 max-w-[22rem]' }, [titleWrap]);
        const tr = el('tr', { class: 'border-t border-gray-100 hover:bg-gray-50 cursor-pointer' }, [
          el('td', { class: 'px-3 py-2' }, [platformBadge(r.platform)]),
          el('td', { class: 'px-3 py-2 text-gray-700', text: r.poi || '—' }),
          titleCell,
          el('td', { class: 'px-3 py-2 text-xs text-gray-600 max-w-[12rem] truncate', title: r.supplier || '', text: r.supplier || '—' }),
          el('td', { class: 'px-3 py-2 text-right tabular-nums', text: r.rating == null ? '—' : Number(r.rating).toFixed(1) }),
          el('td', { class: 'px-3 py-2 text-right tabular-nums text-gray-600', text: fmtNum(r.review_count) }),
          el('td', { class: 'px-3 py-2 text-right tabular-nums text-gray-600', text: fmtNum(r.order_count) }),
          el('td', { class: 'px-3 py-2 text-right tabular-nums', text: String(r.package_count ?? 0) }),
          el('td', { class: 'px-3 py-2 text-right tabular-nums', text: String(r.sku_count ?? 0) }),
          el('td', { class: 'px-3 py-2 text-right tabular-nums font-medium', text: priceRange(r.min_price_usd, r.max_price_usd) }),
          el('td', { class: 'px-3 py-2' }, [statusBadge(r.review_status)]),
        ]);
        tr.addEventListener('click', () => openModal(r));
        tbody.appendChild(tr);
      }
    }

    // ─── modal ──────────────────────────────────────────────────────────
    const modal = document.getElementById('modal');
    const backdrop = document.getElementById('modal-backdrop');
    const modalHeader = document.getElementById('modal-header');
    const modalBody = document.getElementById('modal-body');

    function openModal(activity) {
      modalHeader.replaceChildren();
      modalBody.replaceChildren();
      modalHeader.appendChild(el('div', { class: 'flex items-center gap-2 mb-1 flex-wrap' }, [
        platformBadge(activity.platform),
        statusBadge(activity.review_status),
        el('span', { class: 'text-xs text-gray-400 font-mono', text: `id ${activity.platform_product_id}` }),
      ]));
      modalHeader.appendChild(el('h2', { class: 'text-lg font-semibold leading-tight pr-6', text: activity.title || '(untitled)' }));
      modalHeader.appendChild(el('a', {
        href: activity.canonical_url, target: '_blank', rel: 'noopener',
        class: 'text-xs text-blue-600 hover:underline break-all block mt-1',
        text: activity.canonical_url,
      }));

      // Cover image (when the platform exposed one in raw_extras_json).
      // 16:9 hero — generous but not so tall that the modal scroll target
      // disappears below the fold on smaller screens.
      if (activity.cover_image_url) {
        modalBody.appendChild(el('section', {}, [
          el('div', { class: 'aspect-video bg-gray-100 rounded-lg overflow-hidden border border-gray-200' }, [
            el('img', {
              src: activity.cover_image_url,
              alt: activity.title || '',
              referrerpolicy: 'no-referrer',
              class: 'w-full h-full object-cover',
            }),
          ]),
        ]));
      }
      // Screenshot of the actual scraped page (proof). Renders as a side-by-
      // side comparable below the cover when present.
      if (activity.screenshot_url) {
        modalBody.appendChild(el('section', {}, [
          el('div', { class: 'flex items-center justify-between mb-2' }, [
            el('h3', { class: 'text-xs font-semibold text-gray-500 uppercase tracking-wide', text: 'Scrape screenshot' }),
            el('a', {
              href: activity.screenshot_url, target: '_blank', rel: 'noopener',
              class: 'text-xs text-blue-600 hover:underline',
              text: 'Open full size →',
            }),
          ]),
          el('a', {
            href: activity.screenshot_url, target: '_blank', rel: 'noopener',
            class: 'block bg-gray-100 rounded-lg overflow-hidden border border-gray-200 max-h-96',
          }, [
            el('img', {
              src: activity.screenshot_url,
              alt: 'Page screenshot',
              referrerpolicy: 'no-referrer',
              class: 'w-full h-auto',
            }),
          ]),
        ]));
      }

      // Meta grid
      const meta = el('section', {}, [
        el('h3', { class: 'text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2', text: 'Activity meta' }),
      ]);
      const grid = el('dl', { class: 'grid grid-cols-2 md:grid-cols-3 gap-y-2 gap-x-6 text-sm' });
      const cell = (label, val) => {
        grid.appendChild(el('dt', { class: 'text-xs text-gray-500 uppercase tracking-wide', text: label }));
        grid.appendChild(el('dd', { class: 'font-medium tabular-nums break-words', text: val == null || val === '' ? '—' : String(val) }));
      };
      cell('POI', activity.poi);
      cell('Supplier', activity.supplier);
      cell('Rating', activity.rating == null ? null : `${Number(activity.rating).toFixed(2)} (${fmtNum(activity.review_count)} reviews)`);
      cell('Orders', fmtNum(activity.order_count));
      cell('Duration', fmtDuration(activity.duration_minutes));
      cell('Departure city', activity.departure_city);
      cell('Packages', activity.package_count);
      cell('SKUs', activity.sku_count);
      cell('Price USD range', priceRange(activity.min_price_usd, activity.max_price_usd));
      cell('Avg avail USD', activity.avg_avail_usd == null ? null : fmtUsd(activity.avg_avail_usd));
      cell('First scraped', fmtDate(activity.first_scraped_at));
      cell('Last scraped', fmtDate(activity.last_scraped_at));
      meta.appendChild(grid);
      modalBody.appendChild(meta);

      if (activity.review_note) {
        modalBody.appendChild(textSection('Review note', activity.review_note, 'bg-yellow-50 border-yellow-200 text-yellow-900'));
      }
      if (activity.cancellation_policy) {
        modalBody.appendChild(textSection('Cancellation policy', activity.cancellation_policy));
      }
      if (activity.description) {
        modalBody.appendChild(textSection('Description', activity.description, null, true));
      }

      const extras = safeJson(activity.raw_extras_json);
      if (extras && Object.keys(extras).length > 0) {
        modalBody.appendChild(jsonSection('Raw platform extras', extras));
      }

      // Packages — async
      const pkgSection = el('section', {}, [
        el('h3', { class: 'text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2', text: 'Packages & SKUs' }),
        el('div', { class: 'text-xs text-gray-400', text: 'Loading…' }),
      ]);
      modalBody.appendChild(pkgSection);
      loadPackages(activity.id, pkgSection);

      document.body.classList.add('modal-open');
      modal.classList.remove('hidden');
      backdrop.classList.remove('hidden');
      document.getElementById('modal-card').focus?.();
    }

    function textSection(label, text, tone, collapsible) {
      const wrap = el('section');
      wrap.appendChild(el('h3', { class: 'text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2', text: label }));
      const box = el('div', {
        class: `${tone || 'bg-gray-50 border border-gray-200'} border rounded-lg p-3 text-sm whitespace-pre-wrap leading-relaxed`,
        text,
      });
      if (collapsible && text.length > 320) {
        box.classList.add('max-h-40', 'overflow-hidden', 'relative');
        const toggle = el('button', {
          type: 'button',
          class: 'mt-2 text-xs text-blue-600 hover:underline',
          text: 'Show full description',
          on: {
            click: () => {
              box.classList.toggle('max-h-40');
              box.classList.toggle('overflow-hidden');
              toggle.textContent = box.classList.contains('max-h-40') ? 'Show full description' : 'Collapse';
            },
          },
        });
        wrap.appendChild(box);
        wrap.appendChild(toggle);
      } else {
        wrap.appendChild(box);
      }
      return wrap;
    }

    function jsonSection(label, obj) {
      return el('section', {}, [
        el('h3', { class: 'text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2', text: label }),
        el('pre', {
          class: 'bg-gray-900 text-gray-100 rounded-lg p-3 text-xs overflow-x-auto whitespace-pre-wrap break-all max-h-72',
          text: JSON.stringify(obj, null, 2),
        }),
      ]);
    }

    async function loadPackages(activityId, section) {
      try {
        const [pkgs, skus] = await Promise.all([
          listPackagesForActivity(activityId),
          listSkusForActivity(activityId),
        ]);
        section.replaceChildren();
        section.appendChild(el('h3', { class: 'text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2', text: 'Packages & SKUs' }));
        if (pkgs.length === 0) {
          section.appendChild(el('div', { class: 'text-sm text-gray-500 italic', text: 'No packages — pricing run produced no rows for this activity (check Executions for diagnosis).' }));
          return;
        }
        const skusByPkg = new Map();
        for (const s of skus) {
          if (!skusByPkg.has(s.package_id)) skusByPkg.set(s.package_id, []);
          skusByPkg.get(s.package_id).push(s);
        }
        for (const pkg of pkgs) {
          section.appendChild(renderPackage(pkg, skusByPkg.get(pkg.id) ?? []));
        }
      } catch (err) {
        section.replaceChildren(el('div', { class: 'text-sm text-red-600', text: 'Error: ' + err.message }));
      }
    }

    function renderPackage(pkg, pkgSkus) {
      const wrap = el('div', { class: 'bg-gray-50 border border-gray-200 rounded-lg p-3 mb-3 last:mb-0' });
      const head = el('div', { class: 'flex items-start justify-between gap-3 flex-wrap' }, [
        el('div', { class: 'min-w-0' }, [
          el('div', { class: 'font-semibold text-sm', text: pkg.title || '(untitled)' }),
          el('div', { class: 'text-xs text-gray-500 mt-0.5', text: [
            pkg.tour_type, pkg.group_size,
            pkg.meals === true ? 'meals included' : pkg.meals === false ? 'no meals' : null,
            pkg.departure_city, pkg.departure_time,
            pkg.duration_minutes ? fmtDuration(pkg.duration_minutes) : null,
          ].filter(Boolean).join(' · ') }),
          (Array.isArray(pkg.available_languages) || (typeof pkg.available_languages === 'string'))
            ? el('div', { class: 'text-xs text-gray-500 mt-0.5', text: 'Languages: ' + (() => {
                const lang = typeof pkg.available_languages === 'string' ? safeJson(pkg.available_languages) : pkg.available_languages;
                return Array.isArray(lang) && lang.length ? lang.join(', ') : '—';
              })() })
            : null,
        ]),
        el('div', { class: 'text-xs text-gray-500', text: pkg.platform_package_id ? `pkg ${pkg.platform_package_id}` : '' }),
      ]);
      wrap.appendChild(head);

      // Inclusions / exclusions / completeness
      const inc = typeof pkg.inclusions === 'string' ? safeJson(pkg.inclusions) : pkg.inclusions;
      const exc = typeof pkg.exclusions === 'string' ? safeJson(pkg.exclusions) : pkg.exclusions;
      if ((Array.isArray(inc) && inc.length) || (Array.isArray(exc) && exc.length)) {
        const lists = el('div', { class: 'grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3 text-xs' });
        if (Array.isArray(inc) && inc.length) {
          lists.appendChild(el('div', {}, [
            el('div', { class: 'text-gray-500 uppercase tracking-wide font-semibold mb-1', text: `Inclusions (${inc.length})` }),
            el('ul', { class: 'list-disc pl-4 space-y-0.5 text-gray-700' }, inc.map((x) => el('li', { text: x }))),
          ]));
        }
        if (Array.isArray(exc) && exc.length) {
          lists.appendChild(el('div', {}, [
            el('div', { class: 'text-gray-500 uppercase tracking-wide font-semibold mb-1', text: `Exclusions (${exc.length})` }),
            el('ul', { class: 'list-disc pl-4 space-y-0.5 text-gray-700' }, exc.map((x) => el('li', { text: x }))),
          ]));
        }
        wrap.appendChild(lists);
      }

      // SKU grid
      if (pkgSkus.length === 0) {
        wrap.appendChild(el('div', { class: 'text-xs text-gray-500 italic mt-3', text: 'No SKUs.' }));
      } else {
        const sorted = [...pkgSkus].sort((a, b) => (a.travel_date || '').localeCompare(b.travel_date || ''));
        const grid = el('div', { class: 'grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-2 mt-3' });
        for (const s of sorted) {
          const tone = !s.available
            ? 'bg-gray-100 text-gray-400 line-through'
            : 'bg-white border border-gray-200';
          grid.appendChild(el('div', { class: `${tone} rounded px-2 py-1.5 text-xs`, title: s.last_checked_at ? `last checked ${s.last_checked_at}` : '' }, [
            el('div', { class: 'text-gray-500', text: s.travel_date }),
            el('div', { class: 'font-mono font-medium', text: s.price_usd != null ? `$${Number(s.price_usd).toFixed(2)}` : (s.price_local != null ? `${s.price_local} ${s.currency || ''}` : '—') }),
          ]));
        }
        wrap.appendChild(grid);
      }
      return wrap;
    }

    function closeModal() {
      modal.classList.add('hidden');
      backdrop.classList.add('hidden');
      document.body.classList.remove('modal-open');
      modalBody.replaceChildren();
    }
    document.getElementById('modal-close').addEventListener('click', closeModal);
    backdrop.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !modal.classList.contains('hidden')) closeModal();
    });

    // ─── boot ───────────────────────────────────────────────────────────
    function populatePOIs() {
      const pois = [...new Set(allRows.map((r) => r.poi).filter(Boolean))].sort();
      for (const p of pois) {
        poiSelect.appendChild(el('option', { value: p, text: p }));
      }
    }
    async function load() {
      try {
        allRows = await listActivitiesWithStats({ limit: 500 });
        populatePOIs();
        renderTable();
      } catch (err) {
        tbody.appendChild(el('tr', {}, [
          el('td', { class: 'px-4 py-6 text-center text-red-600', colspan: '11', text: 'Error: ' + err.message }),
        ]));
      }
    }

    document.getElementById('search').addEventListener('input', renderTable);
    document.getElementById('poi').addEventListener('change', renderTable);
    document.getElementById('platform').addEventListener('change', renderTable);
    load();
  </script>
</body>
</html>
